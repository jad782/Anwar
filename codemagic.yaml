# =======================================================
#  Codemagic — بناء تطبيق الأنوار لـ iOS ورفعه إلى TestFlight
#  (Capacitor — تُنفّذ على ماكينة macOS سحابية، فلا حاجة لـ Mac)
#  أنشئ في Codemagic:
#   • تكامل App Store Connect API key  (باسم: codemagic)
#   • مجموعة متغيّرات (Group) باسم: appstore
#       APP_STORE_APP_ID = 6782741099
#       BUNDLE_ID        = com.alanwar.quran.jad        (معرّفك الحالي)
#       APPLE_TEAM_ID    = معرّف فريقك
#   ⚠️ إلزامي قبل البناء: فعّل ميزة App Groups على App ID للتطبيق والودجت
#      في بوابة آبل، وأضِف المجموعة group.com.alanwar.quran للاثنين.
# =======================================================
workflows:
  ios-testflight:
    name: Al-Anwar iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - appstore
      vars:
        XCODE_WORKSPACE: "mobile/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: تثبيت اعتماديات الويب والـ Capacitor
        script: |
          cd mobile
          npm ci
      - name: توليد الأيقونات ونسخ ملفات الويب
        script: |
          cd mobile
          node gen-icons.js || true
          node copy-web.js
      - name: إنشاء/مزامنة مشروع iOS
        script: |
          cd mobile
          [ -d ios ] || npx cap add ios
          npx cap sync ios
          npx @capacitor/assets generate --ios || true
      - name: حقن أذونات Info.plist (إلزامي لقبول آبل)
        script: |
          PLIST="mobile/ios/App/App/Info.plist"
          P=/usr/libexec/PlistBuddy
          add() { $P -c "Add :$1 string '$2'" "$PLIST" 2>/dev/null || $P -c "Set :$1 '$2'" "$PLIST"; }
          add NSLocationWhenInUseUsageDescription "نحتاج موقعك لتحديد اتجاه القبلة بدقّة وحساب أوقات الصلاة لمدينتك. يبقى الموقع على جهازك ولا يُرسل لأي خادم."
          add NSLocationAlwaysAndWhenInUseUsageDescription "نحتاج موقعك لحساب أوقات الصلاة واتجاه القبلة على جهازك فقط."
          add NSMicrophoneUsageDescription "للسماح بتسجيل تلاوتك وحفظها على جهازك، والبحث الصوتي عن الآيات."
          add NSCameraUsageDescription "لعرض اتجاه القبلة فوق الكاميرا (الواقع المعزّز)."
          $P -c "Add :UIBackgroundModes array" "$PLIST" 2>/dev/null || true
          $P -c "Add :UIBackgroundModes:0 string audio" "$PLIST" 2>/dev/null || true
          $P -c "Add :NSSupportsLiveActivities bool true" "$PLIST" 2>/dev/null || $P -c "Set :NSSupportsLiveActivities true" "$PLIST"
      - name: تثبيت Pods
        script: |
          cd mobile/ios/App && pod install
      - name: التوقيع — إنشاء شهادات وبروفايلات تشمل App Groups تلقائياً
        script: |
          keychain initialize
          # أنشئ شهادة توزيع إن لم توجد
          app-store-connect create-certificate --type IOS_DISTRIBUTION --save 2>/dev/null || true
          # أنشئ/اسحب بروفايلات للتطبيق والودجت (تشمل قدرات الـ App ID مثل App Groups)
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          app-store-connect fetch-signing-files "$BUNDLE_ID.AnwarWidgetExtension" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: ضبط رقم البناء
        script: |
          PLIST="mobile/ios/App/App/Info.plist"
          P=/usr/libexec/PlistBuddy
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo 0) + 1))
          $P -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST" 2>/dev/null || $P -c "Add :CFBundleVersion string $BUILD_NUMBER" "$PLIST"
          $P -c "Set :CFBundleShortVersionString 1.0.0" "$PLIST" 2>/dev/null || true
      - name: بناء IPA
        script: |
          xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
