<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#4A2C1A"/>
      <stop offset="60%" stop-color="#2C1810"/>
      <stop offset="100%" stop-color="#1A0E06"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F2D27A"/>
      <stop offset="50%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE9A8" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#F2D27A" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#F2D27A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- هالة نور -->
  <circle cx="512" cy="500" r="300" fill="url(#glow)"/>

  <!-- فانوس -->
