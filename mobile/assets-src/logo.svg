    <!-- حلقة التعليق -->
    <path d="M512 168 v40" />
    <ellipse cx="512" cy="150" rx="26" ry="20"/>
    <!-- غطاء علوي -->
    <path d="M430 250 h164 l-30 -42 h-104 z" fill="url(#gold)" stroke="none"/>
    <path d="M452 250 h120" />
    <!-- جسم الفانوس -->
    <path d="M438 270
             C 405 330 400 470 430 560
             C 445 610 470 650 512 660
             C 554 650 579 610 594 560
             C 624 470 619 330 586 270 Z"
          fill="rgba(212,168,67,0.12)"/>
    <!-- أضلاع -->
    <path d="M470 280 C 450 380 450 520 482 630"/>
    <path d="M554 280 C 574 380 574 520 542 630"/>
    <path d="M512 272 v382"/>
    <!-- قاعدة -->
    <path d="M452 668 h120 l-22 56 h-76 z" fill="url(#gold)" stroke="none"/>
    <path d="M474 742 h76"/>
  </g>

  <!-- شعلة -->
  <path d="M512 380 c -34 36 -40 84 0 118 c 40 -34 34 -82 0 -118 z" fill="url(#gold)"/>
  <path d="M512 420 c -16 18 -18 42 0 60 c 18 -18 16 -42 0 -60 z" fill="#FFF3D0"/>
