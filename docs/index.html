<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق الأنوار — Al-Anwar</title>
<style>
  :root{ --gold:#C9A24B; --bg:#0f0d0a; --card:#1a1712; --text:#efe8db; --muted:#b8ad98; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif;
        background:var(--bg); color:var(--text); line-height:1.9; min-height:100vh;
        display:flex; align-items:center; justify-content:center; padding:24px; }
  .wrap{ max-width:520px; text-align:center; }
  h1{ color:var(--gold); font-size:2rem; margin:.2em 0; }
  p{ color:var(--muted); }
  .links{ display:flex; flex-direction:column; gap:14px; margin-top:28px; }
  a.btn{ display:block; background:var(--card); border:1px solid rgba(201,162,75,.3);
         border-radius:14px; padding:16px; color:var(--gold); text-decoration:none;
         font-size:1.1rem; transition:.2s; }
  a.btn:hover{ background:#221d16; }
  footer{ margin-top:30px; color:var(--muted); font-size:.85rem; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>تطبيق الأنوار</h1>
    <p>Al-Anwar — رفيقك مع القرآن الكريم</p>
    <div class="links">
      <a class="btn" href="privacy.html">سياسة الخصوصية · Privacy Policy</a>
      <a class="btn" href="terms.html">شروط الاستخدام · Terms of Use</a>
    </div>
    <footer>© 2026 Al-Anwar 🤍</footer>
  </div>
</body>
</html>
