<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استوديو لقطات المتجر — الأنوار</title>
<style>
  :root{ --gold:#C9A24B; --gold2:#F2D27A; --bg:#0f0d0a; --card:#1a1712; --text:#efe8db; --muted:#b8ad98; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif;
        background:var(--bg); color:var(--text); padding:20px; }
  h1{ color:var(--gold2); text-align:center; font-size:1.5rem; margin:6px 0 4px; }
  .hint{ text-align:center; color:var(--muted); font-size:.9rem; margin-bottom:20px; }
  .wrap{ display:flex; gap:24px; flex-wrap:wrap; justify-content:center; align-items:flex-start; max-width:1100px; margin:0 auto; }
  .panel{ background:var(--card); border:1px solid rgba(201,162,75,.25); border-radius:18px; padding:18px; width:340px; }
  label{ display:block; color:var(--muted); font-size:.85rem; margin:14px 0 6px; font-weight:700; }
  input[type=text], select, textarea{ width:100%; background:#0d0b08; color:var(--text); border:1px solid rgba(201,162,75,.3);
        border-radius:10px; padding:11px; font-family:inherit; font-size:.95rem; }
  textarea{ min-height:60px; resize:vertical; }
  .file-btn{ display:block; text-align:center; background:linear-gradient(135deg,var(--gold),var(--gold2)); color:#14110B;
        font-weight:800; padding:14px; border-radius:12px; cursor:pointer; margin-top:4px; }
  input[type=file]{ display:none; }
  .row{ display:flex; gap:8px; }
  .row > *{ flex:1; }
  .swatches{ display:flex; gap:8px; margin-top:6px; }
  .sw{ width:38px; height:38px; border-radius:10px; cursor:pointer; border:2px solid transparent; }
  .sw.on{ border-color:var(--gold2); }
  .dl{ width:100%; margin-top:18px; background:linear-gradient(135deg,var(--gold),var(--gold2)); color:#14110B;
        font-weight:800; padding:15px; border:none; border-radius:12px; font-size:1rem; cursor:pointer; }
  .preview{ text-align:center; }
  canvas{ width:270px; height:585px; border-radius:22px; box-shadow:0 20px 60px rgba(0,0,0,.5); background:#000; }
  .presetgrid{ display:flex; flex-direction:column; gap:6px; max-height:190px; overflow-y:auto; margin-top:4px; }
  .preset{ background:#0d0b08; border:1px solid rgba(201,162,75,.2); border-radius:9px; padding:9px 11px; cursor:pointer; font-size:.85rem; color:var(--text); text-align:right; }
  .preset:hover{ border-color:var(--gold); }
  .lang-toggle{ display:flex; gap:6px; margin-top:6px; }
  .lang-toggle button{ flex:1; padding:8px; border-radius:9px; border:1px solid rgba(201,162,75,.3); background:transparent; color:var(--text); cursor:pointer; font-weight:700; }
  .lang-toggle button.on{ background:linear-gradient(135deg,var(--gold),var(--gold2)); color:#14110B; border-color:transparent; }
  input[type=range]{ width:100%; accent-color:var(--gold); margin-top:2px; }
  label span{ color:var(--gold2); }
</style>
</head>
<body>
  <h1>استوديو لقطات المتجر</h1>
  <p class="hint">ارفع صورة شاشتك ← اختر العنوان ← حمّل الصورة الجاهزة (مقاس آبل ١٢٩٠×٢٧٩٦) 🤍</p>
  <div class="wrap">
    <div class="panel">
      <label>١. صورة الشاشة من جهازك</label>
      <label class="file-btn">اختر صورة 📷<input type="file" id="file" accept="image/*"></label>

      <label>المقاس (حسب الاستخدام)</label>
      <select id="fmt" onchange="setFmt(this.value)">
        <option value="appstore">App Store — 1290×2796 (طولي)</option>
        <option value="igpost">بوست انستغرام — 1080×1350</option>
        <option value="igsquare">مربّع انستغرام — 1080×1080</option>
        <option value="story">ستوري/ريلز — 1080×1920</option>
      </select>

      <label>٢. لغة العنوان</label>
      <div class="lang-toggle"><button id="lang-ar" class="on" onclick="setLang('ar')">عربي</button><button id="lang-en" onclick="setLang('en')">English</button></div>

      <label>٣. اختر عنواناً جاهزاً</label>
      <div class="presetgrid" id="presets"></div>

      <label>أو اكتب عنوانك</label>
      <textarea id="caption" oninput="draw()">كل ما يحتاجه يومك الإيماني</textarea>

      <label>٤. لون الخلفية</label>
      <div class="swatches" id="swatches"></div>

      <label>حجم صورة الجوّال: <span id="v-img">100%</span></label>
      <input type="range" id="r-img" min="55" max="130" value="100" oninput="document.getElementById('v-img').textContent=this.value+'%';draw()">

      <label>حجم العنوان: <span id="v-title">100%</span></label>
      <input type="range" id="r-title" min="60" max="150" value="100" oninput="document.getElementById('v-title').textContent=this.value+'%';draw()">

      <label>موضع الصورة عمودياً: <span id="v-pos">0</span></label>
      <input type="range" id="r-pos" min="-150" max="150" value="0" oninput="document.getElementById('v-pos').textContent=this.value;draw()">

      <button class="dl" onclick="download()">⬇️ حمّل الصورة الجاهزة</button>
    </div>

    <div class="preview">
      <canvas id="cv" width="1290" height="2796"></canvas>
    </div>
  </div>

<script>
const PRESETS = {
  ar:[ 'كل ما يحتاجه يومك الإيماني','قرآن كامل يعمل بلا إنترنت','قبلتك أمام عينيك بالكاميرا',
       'احفظ القرآن بتكرار الآيات والتسميع','التزم بصلواتك الخمس كل يوم','أذكار وأدعية بمصادرها الموثّقة',
       'ميزات فاخرة تُثري رحلتك مع القرآن','أذان حقيقي وتنبيهات دقيقة' ],
  en:[ 'Everything for your faithful day','The full Quran — works offline','Find the Qibla through your camera',
       'Memorize with verse repeat & hide','Track your five daily prayers','Adhkar & duas with authentic sources',
       'Luxurious features for your journey','Real athan & precise alerts' ]
};
const BGS = [ ['#1a1206','#0a0703'], ['#0e2a22','#04120c'], ['#14243f','#060a14'], ['#2a1830','#0e0714'], ['#3a2410','#0f0904'] ];
const FMTS = { appstore:[1290,2796], igpost:[1080,1350], igsquare:[1080,1080], story:[1080,1920] };
let lang='ar', bg=0, img=null, fmt='appstore';
function setFmt(f){ fmt=f; const [W,H]=FMTS[f]; const cv=document.getElementById('cv'); cv.width=W; cv.height=H;
  // اضبط حجم العرض مع الحفاظ على النسبة (ارتفاع ثابت ~585)
  const dispH=560, dispW=Math.round(dispH*W/H); cv.style.height=dispH+'px'; cv.style.width=dispW+'px'; draw(); }

function setLang(l){ lang=l; document.getElementById('lang-ar').classList.toggle('on',l==='ar'); document.getElementById('lang-en').classList.toggle('on',l==='en'); document.getElementById('cv').setAttribute('dir', l==='ar'?'rtl':'ltr'); renderPresets(); }
function renderPresets(){ document.getElementById('presets').innerHTML = PRESETS[lang].map(t=>`<div class="preset" onclick="pick(this)">${t}</div>`).join(''); }
function pick(el){ document.getElementById('caption').value = el.textContent; draw(); }
function renderSwatches(){ document.getElementById('swatches').innerHTML = BGS.map((g,i)=>`<div class="sw ${i===bg?'on':''}" style="background:linear-gradient(160deg,${g[0]},${g[1]})" onclick="setBg(${i})"></div>`).join(''); }
function setBg(i){ bg=i; renderSwatches(); draw(); }

document.getElementById('file').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f) return; const r=new FileReader();
  r.onload=()=>{ img=new Image(); img.onload=draw; img.src=r.result; }; r.readAsDataURL(f);
});

function roundRect(x,c,y,w,h,r){ c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath(); }

function draw(){
  const cv=document.getElementById('cv'), x=cv.getContext('2d'); const W=cv.width, H=cv.height;
  const S=W/1080; // معامل قياس نسبي
  const g=x.createLinearGradient(0,0,W,H); g.addColorStop(0,BGS[bg][0]); g.addColorStop(1,BGS[bg][1]); x.fillStyle=g; x.fillRect(0,0,W,H);
  const rg=x.createRadialGradient(W/2,H*0.14,0,W/2,H*0.14,W*0.85); rg.addColorStop(0,'rgba(242,210,122,0.15)'); rg.addColorStop(1,'transparent'); x.fillStyle=rg; x.fillRect(0,0,W,H);
  // العنوان
  const imgScale=(+document.getElementById('r-img').value)/100;
  const titleScale=(+document.getElementById('r-title').value)/100;
  const posOff=(+document.getElementById('r-pos').value)*S;
  x.textAlign='center'; x.fillStyle='#F2D27A'; const fs=Math.round(78*S*titleScale); x.font='bold '+fs+'px -apple-system,Segoe UI,Tahoma,Arial';
  try{ x.direction = lang==='ar'?'rtl':'ltr'; }catch(e){}
  const cap=(document.getElementById('caption').value||'').trim();
  const words=cap.split(/\s+/), lines=[]; let ln='';
  words.forEach(w=>{ const t=ln?ln+' '+w:w; if(x.measureText(t).width>W-150*S && ln){lines.push(ln);ln=w;}else ln=t; }); if(ln)lines.push(ln);
  let ty=Math.round(150*S); lines.forEach(l=>{ x.fillText(l,W/2,ty); ty+=Math.round(fs*1.25); });
  // منطقة الجوّال المتاحة (احتواء الصورة كاملة بلا قص)
  const footer=90*S, top=ty+40*S, availW=W*0.86, availH=H-top-footer;
  let fw=availW, fh=availH;
  if(img){ const ar=img.width/img.height; if(availW/availH > ar){ fh=availH; fw=fh*ar; } else { fw=availW; fh=fw/ar; } }
  fw*=imgScale; fh*=imgScale;
  const fx=(W-fw)/2, fy=top+(availH-fh)/2+posOff, pad=14*S, rad=Math.min(60*S, fw*0.06);
  x.save(); x.shadowColor='rgba(0,0,0,0.5)'; x.shadowBlur=45*S; x.shadowOffsetY=20*S;
  roundRect(fx-pad,x,fy-pad,fw+2*pad,fh+2*pad,rad+pad); x.fillStyle='#000'; x.fill(); x.restore();
  x.save(); roundRect(fx,x,fy,fw,fh,rad); x.clip();
  if(img){ x.drawImage(img, fx, fy, fw, fh); }
  else { x.fillStyle='rgba(255,255,255,0.06)'; x.fillRect(fx,fy,fw,fh);
    x.fillStyle='rgba(255,255,255,0.5)'; x.font=Math.round(38*S)+'px Arial'; x.textAlign='center'; x.fillText('ارفع صورة شاشتك', W/2, fy+fh/2); }
  x.restore();
  // توقيع
  x.fillStyle='rgba(242,210,122,0.6)'; x.font='bold '+Math.round(36*S)+'px -apple-system,Segoe UI,Tahoma,Arial'; x.textAlign='center';
  x.fillText('تطبيق الأنوار', W/2, H-Math.round(40*S));
}
function download(){ const cv=document.getElementById('cv'); const a=document.createElement('a'); a.download='anwar-screenshot.png'; a.href=cv.toDataURL('image/png'); a.click(); }

renderPresets(); renderSwatches(); draw();
</script>
</body>
</html>
